              { id: 'tv_tlv', question: <div><b>III. TẬP LÀM VĂN: (10 điểm)</b><br/><br/><b>Đề bài:</b> Viết bài văn tả một con vật hoặc loài vật mà em yêu thích.</div>, hint: <div><b>Hướng dẫn dàn ý:</b><br/>- Mở bài: Giới thiệu con vật hoặc loài vật.<br/>- Thân bài:<br/>&nbsp;&nbsp;+ Tả đặc điểm nổi bật về hình dáng.<br/>&nbsp;&nbsp;+ Tả hoạt động hoặc thói quen.<br/>&nbsp;&nbsp;+ Nêu cách chăm sóc và bảo vệ con vật, loài vật.<br/>- Kết bài: Nêu suy nghĩ, tình cảm, sự gắn bó... với con vật hoặc loài vật.<br/><br/><b>Bài văn tham khảo (Tả con mèo):</b><br/>Nhà em có nuôi một con mèo rất đáng yêu, em đặt tên cho nó là Miu Miu.<br/><br/>Miu Miu có thân hình nhỏ nhắn, xinh xắn như một cục bông di động. Bộ lông của nó mềm mại và mượt mà. Đôi mắt của Miu Miu tròn xoe, long lanh như hai hòn bi ve. Cái mũi hồng hồng, lúc nào cũng ươn ướt, trông rất đáng yêu. Hai cái tai nhỏ luôn dựng đứng, chỉ cần có tiếng động nhẹ là tai nó đã khẽ động đậy như đang lắng nghe. Cái đuôi dài và mềm mại của Miu Miu thường phe phẩy qua lại, giống như một chiếc roi nhỏ đang vui đùa. Bốn chân của nó nhỏ nhưng rất nhanh nhẹn, giúp nó chạy nhảy thoăn thoắt khắp sân nhà. Mỗi bước đi của Miu Miu đều nhẹ nhàng như không chạm đất. Miu Miu rất thông minh và tinh nghịch. Nó đặc biệt giỏi bắt chuột. Mỗi khi phát hiện có chuột, nó lập tức nằm im rình rập, đôi mắt chăm chú không rời. Chỉ cần con chuột sơ hở, Miu Miu liền lao tới nhanh như chớp, khiến em vô cùng khâm phục.<br/><br/>Em rất yêu quý Miu Miu vì chú không chỉ là một con mèo mà còn là người bạn nhỏ luôn ở bên em mỗi ngày. Em sẽ chăm sóc và yêu thương Miu Miu thật tốt để chú luôn khỏe mạnh, đáng yêu và mãi là niềm vui trong gia đình.</div> }
            ]
          }
        };

        // Component xử lý dạng câu hỏi Nối 2 Cột
        const MatchingQuestion = ({ answers, setAnswers, submitted, khoaHocAnswers, matchingOptions }) => {
            const [selectedMatch, setSelectedMatch] = useState(null);
            const containerRef = useRef(null);
            const leftRefs = useRef({});
            const rightRefs = useRef({});
            const [lines, setLines] = useState([]);

            const matchColors = {
                step1: { bg: 'bg-blue-100', border: 'border-blue-500', text: 'text-blue-800', badge: 'bg-blue-500', ring: 'ring-blue-300', stroke: '#3b82f6' },
                step2: { bg: 'bg-green-100', border: 'border-green-500', text: 'text-green-800', badge: 'bg-green-500', ring: 'ring-green-300', stroke: '#22c55e' },
                step3: { bg: 'bg-purple-100', border: 'border-purple-500', text: 'text-purple-800', badge: 'bg-purple-500', ring: 'ring-purple-300', stroke: '#a855f7' },
                step4: { bg: 'bg-orange-100', border: 'border-orange-500', text: 'text-orange-800', badge: 'bg-orange-500', ring: 'ring-orange-300', stroke: '#f97316' },
            };
            const steps = [ { id: 'step1', label: 'Bước 1' }, { id: 'step2', label: 'Bước 2' }, { id: 'step3', label: 'Bước 3' }, { id: 'step4', label: 'Bước 4' } ];

            const updateLines = () => {
                if (!containerRef.current) return;
                const containerRect = containerRef.current.getBoundingClientRect();
                const newLines = [];
                steps.forEach(step => {
                    const answer = answers[step.id];
                    if (answer && leftRefs.current[step.id] && rightRefs.current[answer]) {
                        const lRect = leftRefs.current[step.id].getBoundingClientRect();
                        const rRect = rightRefs.current[answer].getBoundingClientRect();
                        let x1, y1, x2, y2;
                        if (lRect.bottom < rRect.top) { 
                            x1 = lRect.left + lRect.width / 2 - containerRect.left; y1 = lRect.bottom - containerRect.top;
                            x2 = rRect.left + rRect.width / 2 - containerRect.left; y2 = rRect.top - containerRect.top;
                        } else {
                            x1 = lRect.right - containerRect.left; y1 = lRect.top + lRect.height / 2 - containerRect.top;
                            x2 = rRect.left - containerRect.left; y2 = rRect.top + rRect.height / 2 - containerRect.top;
                        }
                        newLines.push({ id: step.id, x1, y1, x2, y2, color: matchColors[step.id].stroke });
                    }
                });
                setLines(newLines);
            };

            useEffect(() => {
                const timer = setTimeout(updateLines, 50);
                window.addEventListener('resize', updateLines);
                return () => { clearTimeout(timer); window.removeEventListener('resize', updateLines); };
            }, [answers, submitted]);

            const handleOptionClick = (opt) => {
                if (submitted) return;
                if (selectedMatch) {
                    setAnswers(prev => {
                        const newAnswers = { ...prev };
                        steps.forEach(s => { if (newAnswers[s.id] === opt) newAnswers[s.id] = null; });
                        newAnswers[selectedMatch] = opt;
                        return newAnswers;
                    });
                    setSelectedMatch(null);
                } else {
                    setAnswers(prev => {
                        const newAnswers = { ...prev };
                        let changed = false;
                        steps.forEach(s => {
                            if (newAnswers[s.id] === opt) { newAnswers[s.id] = null; changed = true; }
                        });
                        return changed ? newAnswers : prev;
                    });
                }
            };

            return (
                <div className="bg-indigo-50/50 p-5 rounded-xl border border-indigo-100 shadow-sm overflow-hidden">
                    <p className="font-semibold text-lg mb-2 text-gray-800">Câu 5 (2 điểm). Em hãy nối thứ tự các bước ở cột A với tên bước ở cột B sao cho đúng với các bước lắp ghép mô hình cầu vượt.</p>
                    <p className="text-sm text-gray-600 mb-6 italic bg-white inline-block px-3 py-1 rounded-full border border-gray-200">💡 <b>Hướng dẫn:</b> Nhấn chọn "Bước" ở cột A, sau đó chọn nội dung tương ứng ở cột B để vẽ đường nối lại với nhau.</p>
                    <div className="relative flex flex-col md:flex-row gap-8 md:gap-20" ref={containerRef}>
                        <svg className="absolute top-0 left-0 w-full h-full pointer-events-none" style={{ zIndex: 1, overflow: 'visible' }}>
                            {lines.map(line => (
                                <line key={`line-${line.id}`} x1={line.x1} y1={line.y1} x2={line.x2} y2={line.y2} stroke={line.color} strokeWidth="4" strokeLinecap="round" style={{ filter: 'drop-shadow(0px 2px 2px rgba(0,0,0,0.2))', transition: 'all 0.3s ease' }} />
                            ))}
                        </svg>
                        <div className="flex-1 flex flex-col gap-4 relative z-10">
                            <div className="font-bold text-center text-gray-700 bg-gray-200 py-2 rounded mb-1">Cột A</div>
                            {steps.map(step => {
                                const isSelected = selectedMatch === step.id; const hasAnswer = answers[step.id]; const colorScheme = matchColors[step.id];
                                let btnClass = "p-3 rounded-xl border-2 font-bold text-center transition-all bg-white ";
                                if (submitted) {
                                    btnClass += hasAnswer ? `${colorScheme.bg} ${colorScheme.border} ${colorScheme.text} opacity-90 cursor-default` : "border-gray-300 bg-gray-100 text-gray-500 opacity-90 cursor-default";
                                } else {
                                    if (isSelected) btnClass += `${colorScheme.border} shadow-md ring-4 ${colorScheme.ring} text-gray-800 transform scale-105`;
                                    else if (hasAnswer) btnClass += `${colorScheme.bg} ${colorScheme.border} ${colorScheme.text} hover:opacity-80`;
                                    else btnClass += "border-gray-300 text-gray-700 hover:border-gray-400 hover:bg-gray-50";
                                }
                                return ( <button key={step.id} ref={el => leftRefs.current[step.id] = el} disabled={submitted} onClick={() => setSelectedMatch(step.id === selectedMatch ? null : step.id)} className={btnClass}>{step.label}</button> );
                            })}
                        </div>
                        <div className="flex-[2] flex flex-col gap-4 relative z-10">
                            <div className="font-bold text-center text-gray-700 bg-gray-200 py-2 rounded mb-1">Cột B</div>
                            {matchingOptions.map(opt => {
                                let assignedStepId = null; steps.forEach(s => { if (answers[s.id] === opt) assignedStepId = s.id; });
                                const colorScheme = assignedStepId ? matchColors[assignedStepId] : null;
                                let btnClass = "p-3 rounded-xl border-2 font-medium transition-all text-left flex items-center gap-3 bg-white ";
                                if (submitted) {
                                    btnClass += colorScheme ? `${colorScheme.bg} ${colorScheme.border} ${colorScheme.text} opacity-90 cursor-default` : "border-gray-300 bg-gray-100 text-gray-500 opacity-90 cursor-default";
                                } else {
                                    if (colorScheme) btnClass += `${colorScheme.bg} ${colorScheme.border} ${colorScheme.text} hover:opacity-80`;
                                    else if (selectedMatch) btnClass += "border-dashed border-indigo-400 bg-indigo-50 text-indigo-800 hover:border-solid hover:shadow-md cursor-pointer";
                                    else btnClass += "border-gray-300 text-gray-700 hover:bg-gray-50 cursor-pointer";
                                }
                                return (
                                    <button key={opt} ref={el => rightRefs.current[opt] = el} disabled={submitted} onClick={() => handleOptionClick(opt)} className={btnClass}>
                                        <span className={`w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center text-xs font-bold text-white ${colorScheme ? `${colorScheme.badge} border-transparent` : 'border-gray-300 bg-white'}`}>{assignedStepId ? assignedStepId.replace('step', '') : ''}</span>
                                        {opt}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                    {submitted && (
                        <div className="mt-8 p-4 bg-white rounded-xl border-2 border-gray-100 shadow-sm">
                            <p className="font-bold text-gray-800 mb-3 flex items-center gap-2"><BookOpen size={20} className="text-indigo-500"/> Hướng dẫn đáp án & Kết quả:</p>
                            <div className="space-y-3">
                                {steps.map(step => {
                                    const isCorrect = answers[step.id] === khoaHocAnswers[step.id];
                                    return (
                                        <div key={step.id} className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2 text-sm bg-gray-50 p-2 rounded">
                                            <div className="flex items-center gap-2 font-semibold whitespace-nowrap">
                                                {isCorrect ? <CheckCircle2 size={18} className="text-green-600"/> : <XCircle size={18} className="text-red-600"/>}
                                                <span className={matchColors[step.id].text}>{step.label}</span>
                                            </div>
                                            <span className="hidden sm:inline text-gray-400">→</span>
                                            <span className={isCorrect ? "text-green-700 font-medium" : "text-gray-600"}>{answers[step.id] || '(Chưa nối)'}</span>
                                            {!isCorrect && (<div className="mt-1 sm:mt-0 sm:ml-auto text-red-600 font-medium bg-red-50 px-2 py-1 rounded text-xs border border-red-100">Đúng: {khoaHocAnswers[step.id]}</div>)}
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
          const [activeTab, setActiveTab] = useState('tiengViet'); 
          const [answers, setAnswers] = useState({});
          const [submitted, setSubmitted] = useState(false);
          const [scoreTN, setScoreTN] = useState(0);

          const currentData = quizData[activeTab];

          const handleTabChange = (tab) => {
            setActiveTab(tab);
            setAnswers({});
            setSubmitted(false);
            setScoreTN(0);
          };

          const handleOptionChange = (questionId, optionKey) => {
            if (submitted) return;
            setAnswers(prev => ({ ...prev, [questionId]: optionKey }));
          };

          const handleTextChange = (questionId, text) => {
            if (submitted) return;
            setAnswers(prev => ({ ...prev, [questionId]: text }));
          };

          const calculateScore = () => {
            let score = 0;
            currentData.tracNghiem.forEach(q => {
              if (q.type === 'dien_khuyet') {
                if (answers['q4_1'] === q4Answers['q4_1']) score += 0.5;
                if (answers['q4_2'] === q4Answers['q4_2']) score += 0.5;
                if (answers['q4_3'] === q4Answers['q4_3']) score += 0.5;
              } else if (q.type === 'noi_buoc') {
                if (answers['step1'] === khoaHocAnswers.step1) score += 0.5;
                if (answers['step2'] === khoaHocAnswers.step2) score += 0.5;
                if (answers['step3'] === khoaHocAnswers.step3) score += 0.5;
                if (answers['step4'] === khoaHocAnswers.step4) score += 0.5;
              } else {
                if (answers[q.id] === q.correct) score += q.score;
              }
            });
            setScoreTN(score);
            setSubmitted(true);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const resetQuiz = () => {
            setAnswers({});
            setSubmitted(false);
            setScoreTN(0);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const getThemeColors = () => {
              if (currentData.theme === 'emerald') return { header: 'from-emerald-600 to-teal-700', text: 'text-emerald-800', bg: 'bg-emerald-500', btn: 'bg-gradient-to-r from-emerald-600 to-teal-600 shadow-emerald-500/30 hover:shadow-emerald-500/50', border: 'border-emerald-200' };
              if (currentData.theme === 'indigo') return { header: 'from-indigo-600 to-purple-700', text: 'text-indigo-800', bg: 'bg-indigo-500', btn: 'bg-gradient-to-r from-indigo-600 to-purple-600 shadow-indigo-500/30 hover:shadow-indigo-500/50', border: 'border-indigo-200' };
              if (currentData.theme === 'rose') return { header: 'from-rose-500 to-red-600', text: 'text-rose-800', bg: 'bg-rose-500', btn: 'bg-gradient-to-r from-rose-500 to-red-600 shadow-rose-500/30 hover:shadow-rose-500/50', border: 'border-rose-200' };
              return { header: 'from-blue-600 to-indigo-700', text: 'text-blue-800', bg: 'bg-blue-500', btn: 'bg-gradient-to-r from-blue-600 to-indigo-600 shadow-blue-500/30 hover:shadow-blue-500/50', border: 'border-blue-200' };
          };

          const colors = getThemeColors();

          return (
            <div className={`min-h-screen py-8 px-4 font-sans text-gray-800 bg-gray-50`}>
              <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
                
                {/* Header */}
                <div className={`bg-gradient-to-r ${colors.header} p-6 text-white text-center relative overflow-hidden transition-all duration-500`}>
                  <BookOpen className="absolute -left-4 -top-4 w-24 h-24 text-white opacity-20 transform -rotate-12" />
                  <Award className="absolute -right-4 -top-4 w-24 h-24 text-white opacity-20 transform rotate-12" />
                  <h1 className="text-3xl md:text-4xl font-bold mb-2">ĐỀ ÔN CUỐI KÌ 2</h1>
                  <h2 className="text-xl md:text-2xl font-medium opacity-90">Lớp 4</h2>
                </div>

                {/* Tab Menu */}
                <div className="bg-gray-100 border-b border-gray-200 p-4">
                  <div className="flex flex-wrap justify-center gap-3">
                    <button onClick={() => handleTabChange('tiengViet')} className={`px-6 py-3 rounded-full font-bold flex items-center gap-2 transition-all ${activeTab === 'tiengViet' ? 'bg-rose-600 text-white shadow-lg scale-105' : 'bg-white text-rose-600 border border-rose-200 hover:bg-rose-50'}`}><BookMarked size={20} /> Tiếng Việt</button>
                    <button onClick={() => handleTabChange('toan')} className={`px-6 py-3 rounded-full font-bold flex items-center gap-2 transition-all ${activeTab === 'toan' ? 'bg-emerald-600 text-white shadow-lg scale-105' : 'bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50'}`}><Calculator size={20} /> Toán</button>
                    <button onClick={() => handleTabChange('khoaHoc')} className={`px-6 py-3 rounded-full font-bold flex items-center gap-2 transition-all ${activeTab === 'khoaHoc' ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-50'}`}><Microscope size={20} /> Khoa học</button>
                    <button onClick={() => handleTabChange('lichSu')} className={`px-6 py-3 rounded-full font-bold flex items-center gap-2 transition-all ${activeTab === 'lichSu' ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-white text-blue-600 border border-blue-200 hover:bg-blue-50'}`}><Globe size={20} /> Lịch sử - Địa lí</button>
                  </div>
                </div>

                {/* Bảng kết quả */}
                {submitted && (
                  <div className="m-6 p-6 bg-yellow-50 border-2 border-yellow-400 rounded-xl flex flex-col items-center shadow-sm">
                    <h3 className="text-2xl font-bold text-yellow-700 mb-2">Kết quả phần Trắc nghiệm</h3>
                    <div className="text-5xl font-black text-yellow-600 mb-2">{scoreTN.toFixed(1)} / {currentData.maxScoreTN.toFixed(1)}</div>
                    <p className="text-gray-700 text-center text-lg mb-4">
                      Tuyệt vời! Con đã hoàn thành phần trắc nghiệm môn {currentData.title}. Hãy tiếp tục ôn tập phần Tự luận bên dưới nhé!
                    </p>
                  </div>
                )}

                <div className="p-6 md:p-8">
                  {/* PHẦN ĐỌC HIỂU (Cho Tiếng Việt) */}
                  {currentData.readingText && (
                    <div className={`mb-10 p-6 md:p-8 bg-white rounded-2xl border-2 ${colors.border} shadow-sm`}>
                        <h3 className={`text-2xl md:text-3xl font-bold ${colors.text} mb-6 text-center leading-tight`}>
                            {currentData.readingTitle}
                        </h3>
                        <div className="text-lg leading-loose text-gray-800 space-y-4">
                            {currentData.readingText.split('\n').map((p, idx) => (
                                <p key={idx} className="text-justify md:px-4">{p}</p>
                            ))}
                        </div>
                        {currentData.readingAuthor && (
                            <p className={`text-right font-bold mt-6 text-lg ${colors.text} italic md:px-4`}>
                                {currentData.readingAuthor}
                            </p>
                        )}
                    </div>
                  )}

                  {/* I. PHẦN TRẮC NGHIỆM */}
                  <section className="mb-12">
                    <div className={`flex items-center gap-3 border-b-2 ${colors.border} pb-3 mb-6`}>
                      <div className={`${colors.bg} text-white p-2 rounded-lg`}><CheckCircle2 size={24} /></div>
                      <h2 className={`text-2xl font-bold ${colors.text}`}>I. PHẦN TRẮC NGHIỆM ({currentData.maxScoreTN} điểm)</h2>
                    </div>

                    <div className="space-y-8">
                      {currentData.tracNghiem.map((q) => {
                        // 1. Dạng câu Điền Khuyết (Lịch sử)
                        if (q.type === 'dien_khuyet') {
                          return (
                            <div key="dien_khuyet" className="bg-blue-50/50 p-5 rounded-xl border border-blue-100 shadow-sm">
                              <p className="font-semibold text-lg mb-3 text-gray-800">Câu 4 (1.5 điểm). Chọn từ thích hợp để điền vào chỗ trống.</p>
                              <div className="flex flex-wrap gap-2 mb-4 p-3 bg-white rounded-lg border border-gray-200">
                                <span className="text-gray-500 font-medium mr-2">Từ gợi ý:</span>
                                {q4Options.map(opt => <span key={opt} className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium">{opt}</span>)}
                              </div>
                              <div className="text-lg leading-loose text-gray-800 bg-white p-4 rounded-xl border border-gray-200">
                                Cồng chiêng gắn liền với đời sống <select disabled={submitted} value={answers['q4_1'] || ''} onChange={(e) => handleOptionChange('q4_1', e.target.value)} className={`mx-2 p-1 border-b-2 bg-transparent font-bold outline-none transition-colors ${!submitted ? 'border-blue-500 text-blue-700' : answers['q4_1'] === q4Answers['q4_1'] ? 'border-green-500 text-green-600' : 'border-red-500 text-red-600'}`}><option value="" disabled>--- (1) ---</option>{q4Options.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select>
                                của người Tây Nguyên từ lúc <select disabled={submitted} value={answers['q4_2'] || ''} onChange={(e) => handleOptionChange('q4_2', e.target.value)} className={`mx-2 p-1 border-b-2 bg-transparent font-bold outline-none transition-colors ${!submitted ? 'border-blue-500 text-blue-700' : answers['q4_2'] === q4Answers['q4_2'] ? 'border-green-500 text-green-600' : 'border-red-500 text-red-600'}`}><option value="" disabled>--- (2) ---</option>{q4Options.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select>
                                đến khi <select disabled={submitted} value={answers['q4_3'] || ''} onChange={(e) => handleOptionChange('q4_3', e.target.value)} className={`mx-2 p-1 border-b-2 bg-transparent font-bold outline-none transition-colors ${!submitted ? 'border-blue-500 text-blue-700' : answers['q4_3'] === q4Answers['q4_3'] ? 'border-green-500 text-green-600' : 'border-red-500 text-red-600'}`}><option value="" disabled>--- (3) ---</option>{q4Options.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select>.
                              </div>
                              {submitted && (
                                <div className={`mt-4 p-4 rounded-xl border ${answers['q4_1'] === q4Answers.q4_1 && answers['q4_2'] === q4Answers.q4_2 && answers['q4_3'] === q4Answers.q4_3 ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'}`}>
                                   <div className="bg-white p-3 rounded-lg border border-gray-200">
                                       <p className="font-bold text-gray-700 mb-2 flex items-center gap-2"><BookOpen size={18} className="text-blue-500" /> Hướng dẫn đáp án:</p>
                                       <ul className="list-disc pl-5 text-gray-800 font-medium">
                                         <li>(1) <span className="text-green-600 font-bold">{q4Answers.q4_1}</span></li>
                                         <li>(2) <span className="text-green-600 font-bold">{q4Answers.q4_2}</span></li>
                                         <li>(3) <span className="text-green-600 font-bold">{q4Answers.q4_3}</span></li>
                                       </ul>
                                   </div>
                                </div>
                              )}
                            </div>
                          );
                        }

                        // 2. Dạng câu Nối Bước (Khoa học)
                        if (q.type === 'noi_buoc') {
                          return ( <MatchingQuestion key="noi_buoc" answers={answers} setAnswers={setAnswers} submitted={submitted} khoaHocAnswers={khoaHocAnswers} matchingOptions={quizData.khoaHoc.matchingOptions} /> );
                        }

                        // 3. Dạng Trắc nghiệm thông thường
                        return (
                          <div key={q.id} className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                            <div className="font-semibold text-lg mb-4 text-gray-800">{q.question}</div>
                            {q.customContent && <div className="my-5">{q.customContent}</div>}
                            {q.questionText2 && <div className="font-semibold text-lg mb-4 text-gray-800">{q.questionText2}</div>}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                              {Object.entries(q.options).map(([key, value]) => {
                                const isSelected = answers[q.id] === key; const isCorrect = q.correct === key;
                                let btnClass = "text-left p-3 rounded-lg border-2 transition-all duration-200 flex items-center gap-3 ";
                                if (!submitted) btnClass += isSelected ? `bg-${currentData.theme}-100 border-${currentData.theme}-500` : "bg-gray-50 border-gray-200 hover:border-gray-300 hover:bg-gray-100";
                                else {
                                  if (isCorrect) btnClass += "bg-green-100 border-green-500 text-green-800";
                                  else if (isSelected && !isCorrect) btnClass += "bg-red-100 border-red-500 text-red-800";
                                  else btnClass += "bg-gray-50 border-gray-200 opacity-50";
                                }
                                return (
                                  <button key={key} onClick={() => handleOptionChange(q.id, key)} disabled={submitted} className={btnClass}>
                                    <span className={`w-8 h-8 shrink-0 flex items-center justify-center rounded-full text-base font-bold ${ (submitted && isCorrect) ? "bg-green-500 text-white" : (submitted && isSelected && !isCorrect) ? "bg-red-500 text-white" : isSelected ? `${colors.bg} text-white` : "bg-gray-200 text-gray-600" }`}>{key}</span>
                                    <span className="leading-tight pt-0.5 text-lg flex items-center">{value}</span>
                                  </button>
                                );
                              })}
                            </div>

                            {/* Hướng dẫn đáp án cho phần trắc nghiệm thông thường */}
                            {submitted && (
                              <div className={`mt-5 p-4 rounded-xl border ${answers[q.id] === q.correct ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                  <div className={`font-bold flex items-center gap-2 ${answers[q.id] === q.correct ? 'text-green-700' : 'text-red-700'}`}>
                                      {answers[q.id] === q.correct ? <CheckCircle2 size={20} /> : <XCircle size={20} />}
                                      {answers[q.id] === q.correct ? `Chính xác! (+${q.score} điểm)` : 'Chưa chính xác!'}
                                  </div>
                                  <div className="bg-white p-3 rounded-lg border border-gray-200 mt-3 flex items-center gap-2 flex-wrap">
                                      <BookOpen size={18} className={`text-${currentData.theme}-500`} />
                                      <span className="font-bold text-gray-700">Hướng dẫn đáp án:</span>
                                      <span className={`inline-flex items-center justify-center w-7 h-7 rounded-full ${colors.bg} text-white text-sm font-bold ml-1 mr-1`}>{q.correct}</span>
                                      <span className="font-medium text-gray-800 flex items-center">{q.options[q.correct]}</span>
                                  </div>
                              </div>
                            )}

                          </div>
                        );
                      })}
                    </div>
                  </section>

                  {/* II. PHẦN TỰ LUẬN */}
                  <section className="mb-8">
                    <div className={`flex items-center gap-3 border-b-2 ${colors.border} pb-3 mb-6`}>
                      <div className={`${colors.bg} text-white p-2 rounded-lg`}><PenTool size={24} /></div>
                      <h2 className={`text-2xl font-bold ${colors.text}`}>II. PHẦN TỰ LUẬN ({currentData.maxScoreTL} điểm)</h2>
                    </div>

                    <div className="space-y-6">
                      {currentData.tuLuan.map((q) => (
                        <div key={q.id} className={`bg-white p-5 rounded-xl border-2 ${colors.border} shadow-sm flex flex-col gap-4`}>
                          <div className="font-semibold text-xl text-gray-800 leading-relaxed">{q.question}</div>
                          
                          {/* KIỂM TRA Render Custom Input */}
                          {q.renderCustomInput ? (
                              q.renderCustomInput(answers, handleTextChange, submitted)
                          ) : (
                              <textarea
                                disabled={submitted} value={answers[q.id] || ''} onChange={(e) => handleTextChange(q.id, e.target.value)}
                                placeholder="Bé hãy gõ câu trả lời vào đây..."
                                className={`w-full min-h-[100px] p-4 border border-gray-300 rounded-xl focus:ring-2 outline-none resize-y transition-shadow disabled:bg-gray-50 disabled:text-gray-600 text-lg focus:ring-${currentData.theme}-500 focus:border-${currentData.theme}-500`}
                              ></textarea>
                          )}

                          <div className={`p-5 bg-${currentData.theme}-50 border ${colors.border} rounded-xl`}>
                            <h4 className={`font-bold ${colors.text} mb-3 flex items-center gap-2`}><BookOpen size={20} /> Hướng dẫn & Đáp án:</h4>
                            <div className={`text-${currentData.theme}-950 text-lg leading-relaxed font-medium`}>{q.hint}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>

                  {/* Nút Hành Động Ở Dưới Cùng */}
                  <div className="flex flex-col sm:flex-row justify-center items-center gap-4 mt-10">
                    {!submitted && (
                      <button onClick={calculateScore} className={`text-white px-10 py-4 rounded-full text-xl font-bold transition-all ${colors.btn} shadow-lg w-full sm:w-auto`}>
                        Nộp bài & Xem kết quả
                      </button>
                    )}
                    <button 
                      onClick={resetQuiz} 
                      className="flex items-center justify-center gap-2 bg-gray-200 hover:bg-gray-300 text-gray-700 px-8 py-4 rounded-full text-lg font-bold transition-transform hover:scale-105 shadow-md w-full sm:w-auto"
                    >
                      <RefreshCw size={24} /> Xoá làm lại toàn bộ
                    </button>
                  </div>

                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
